<section class="section-dark gallery-hero page-hero">
  <div class="container hero-inner">
    <h1>{{ 'gallery.title' | transloco }}</h1>
    <p class="hero-intro">{{ 'gallery.intro' | cms }}</p>

    @if (filters().length) {
      <div class="filter-bar" role="tablist">
        <button
          type="button"
          role="tab"
          class="filter-btn"
          [class.active]="activeFolder() === null"
          [attr.aria-selected]="activeFolder() === null"
          (click)="select(null)">
          {{ 'gallery.all' | transloco }}
        </button>
        @for (folder of filters(); track folder.id) {
          <button
            type="button"
            role="tab"
            class="filter-btn"
            [class.active]="activeFolder() === folder.id"
            [attr.aria-selected]="activeFolder() === folder.id"
            (click)="select(folder.id)">
            {{ folder.name }}
          </button>
        }
      </div>
    }
  </div>
</section>

<section class="gallery-section">
  <div class="container">
    @if (visible().length) {
      <div class="bento">
        @for (entry of visible(); track entry.item.id) {
          <figure class="tile" [class]="'tile tile-' + entry.shape">
            <div class="tile-media">
              @switch (entry.item.mediaType) {
                @case ('video') {
                  <video [src]="entry.item.imageUrl" controls preload="metadata"></video>
                }
                @case ('file') {
                  <a class="file-tile" [href]="entry.item.imageUrl" target="_blank" rel="noopener">
                    <span aria-hidden="true">📄</span>
                  </a>
                }
                @default {
                  <img
                    [src]="entry.item.thumbUrl || entry.item.imageUrl"
                    [alt]="lang.pick(entry.item, 'caption')"
                    loading="lazy" />
                }
              }

              @if (lang.pick(entry.item, 'caption')) {
                <figcaption class="tile-overlay">
                  <span class="tile-caption">{{ lang.pick(entry.item, 'caption') }}</span>
                </figcaption>
              }
            </div>
          </figure>
        }
      </div>
    } @else {
      <div class="gallery-empty">
        <img src="/assets/logo.png" alt="" class="empty-logo" />
        <p>{{ 'gallery.empty' | transloco }}</p>
        <a href="https://instagram.com/Yemeni.breeze" target="_blank" rel="noopener" class="btn btn-primary">
          <span dir="ltr">&#64;Yemeni.breeze</span>
        </a>
      </div>
    }
  </div>
</section>
