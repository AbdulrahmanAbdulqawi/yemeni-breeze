<section class="section-dark page-head">
  <div class="container">
    <h1>{{ 'gallery.title' | transloco }}</h1>
  </div>
</section>

<section class="section">
  <div class="container">
    @if (items().length) {
      <div class="gallery-grid">
        @for (item of items(); track item.id) {
          <figure class="gallery-item arch">
            @switch (item.mediaType) {
              @case ('video') {
                <video [src]="item.imageUrl" controls preload="metadata"></video>
              }
              @case ('file') {
                <a class="file-tile" [href]="item.imageUrl" target="_blank" rel="noopener">📄</a>
              }
              @default {
                <img [src]="item.thumbUrl || item.imageUrl" [alt]="lang.pick(item, 'caption')" loading="lazy" />
              }
            }
            @if (lang.pick(item, 'caption')) {
              <figcaption>{{ lang.pick(item, 'caption') }}</figcaption>
            }
          </figure>
        }
      </div>
    } @else {
      <div class="gallery-empty">
        <img src="/assets/logo.png" alt="" class="empty-logo" />
        <p>{{ 'gallery.empty' | transloco }}</p>
        <a href="https://instagram.com/Yemeni.breeze" target="_blank" rel="noopener" class="btn btn-primary">
          <span dir="ltr">&#64;Yemeni.breeze</span>
        </a>
      </div>
    }
  </div>
</section>
