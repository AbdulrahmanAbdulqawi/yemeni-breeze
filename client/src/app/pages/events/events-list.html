<section class="section-dark page-head page-hero">
  <div class="container">
    <h1>{{ 'events.title' | transloco }}</h1>
    <p class="events-intro">{{ 'events.intro' | cms }}</p>
  </div>
</section>

<section class="section">
  <div class="container">
    @if (upcoming().length) {
      <h2 class="section-title">{{ 'events.upcoming' | transloco }}</h2>
      <div class="events-grid">
        @for (event of upcoming(); track event.id) {
          <app-event-card [event]="event" variant="upcoming" />
        }
      </div>
    }

    @if (past().length) {
      <h2 class="section-title past-title">{{ 'events.past' | transloco }}</h2>
      <div class="events-grid">
        @for (event of past(); track event.id) {
          <app-event-card [event]="event" variant="past" />
        }
      </div>
    }
  </div>
</section>
