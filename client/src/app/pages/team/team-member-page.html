@if (member(); as member) {
  <section class="section-dark page-hero team-hero">
    <div class="container">
      @if (member.photoUrl) {
        <img [src]="member.photoUrl" alt="" class="team-hero-photo" />
      } @else {
        <div class="team-hero-photo team-hero-photo-placeholder">{{ member.name.charAt(0) }}</div>
      }
      <h1>{{ member.name }}</h1>
      <p class="team-hero-role">{{ lang.pick(member, 'role') }}</p>
    </div>
  </section>

  <section class="section">
    <div class="container narrow">
      <div class="card card-content team-bio">
        <p>{{ lang.pick(member, 'bio') }}</p>
      </div>
      <p class="team-back">
        <a routerLink="/about" class="btn-arrow">{{ 'about.backToTeam' | transloco }}</a>
      </p>
    </div>
  </section>
}
