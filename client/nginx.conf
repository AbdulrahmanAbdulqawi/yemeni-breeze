server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Allow large media uploads (videos up to ~200 MB) through to the API
  client_max_body_size 210m;

  # API + uploaded media go to the .NET backend
  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off; # stream large uploads instead of buffering to disk first
  }

  location /uploads/ {
    proxy_pass http://api:8080;
  }

  # Build output is hash-named, so it can be cached forever.
  location ~* \.(?:js|css|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Translation files live at stable URLs, so a cached copy hides newly added
  # keys until a hard refresh (they render as raw "admin.media.x" strings).
  # Force revalidation — the ETag makes the common case a cheap 304.
  location /i18n/ {
    add_header Cache-Control "no-cache" always;
  }

  # Angular SPA fallback. index.html points at hash-named bundles, so a stale
  # copy pins the browser to the previous build; revalidate it too.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
